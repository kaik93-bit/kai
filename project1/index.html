<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Cache-Control: Verhindert, dass Browser die Seite hartnäckig zwischenspeichern -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>KAI // FANCY_CALC</title>
    
    <!-- Google Fonts: Space Grotesk (Sci-Fi headings) & Inter (Clean UI text) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script>
        // Sicherheits-Check: Falls der Nutzer nicht über das Hauptportal eingeloggt ist, zurückleiten!
        if (sessionStorage.getItem('kai_dev_unlocked') !== 'true') {
            window.location.href = '../index.html';
        }
    </script>
    
    <style>
        :root {
            --bg-color: #040407;
            --panel-bg: rgba(15, 12, 28, 0.7);
            --text-primary: #f3e8ff;
            --text-secondary: #94a3b8;
            
            /* Turquoise & Light Purple */
            --turquoise: #00f2fe;
            --purple: #d8b4fe;
            --magenta: #fe019a;
            --calc-btn-bg: rgba(255, 255, 255, 0.02);
            --calc-btn-border: rgba(216, 180, 254, 0.08);
            
            --neon-shadow-turquoise: 0 0 15px rgba(0, 242, 254, 0.3);
            --neon-shadow-purple: 0 0 15px rgba(216, 180, 254, 0.3);
            --neon-shadow-magenta: 0 0 15px rgba(254, 1, 154, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Glow Backgrounds */
        .ambient-glow-1 {
            position: fixed;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.06) 0%, transparent 70%);
            top: -100px;
            left: -100px;
            pointer-events: none;
            z-index: -1;
        }

        .ambient-glow-2 {
            position: fixed;
            width: 550px;
            height: 550px;
            background: radial-gradient(circle, rgba(216, 180, 254, 0.06) 0%, transparent 70%);
            bottom: -150px;
            right: -100px;
            pointer-events: none;
            z-index: -1;
        }

        header {
            background: rgba(4, 4, 7, 0.85);
            border-bottom: 1px solid rgba(216, 180, 254, 0.1);
            padding: 1.25rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 10;
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--turquoise), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .back-btn {
            background: rgba(216, 180, 254, 0.05);
            border: 1px solid rgba(216, 180, 254, 0.15);
            color: var(--purple);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-btn:hover {
            background: rgba(0, 242, 254, 0.1);
            border-color: var(--turquoise);
            color: var(--turquoise);
            box-shadow: var(--neon-shadow-turquoise);
        }

        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            position: relative;
        }

        /* Calculator Container */
        .calc-container {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(216, 180, 254, 0.08);
            border-radius: 24px;
            padding: 2rem;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(216, 180, 254, 0.03);
            position: relative;
            margin-bottom: 2rem;
        }

        /* Decorative Corners */
        .calc-container::after {
            content: '';
            position: absolute;
            top: -1px; left: -1px; width: 16px; height: 16px;
            border-top: 2px solid var(--turquoise);
            border-left: 2px solid var(--turquoise);
            border-radius: 24px 0 0 0;
        }
        .calc-container::before {
            content: '';
            position: absolute;
            bottom: -1px; right: -1px; width: 16px; height: 16px;
            border-bottom: 2px solid var(--purple);
            border-right: 2px solid var(--purple);
            border-radius: 0 0 24px 0;
        }

        /* Display Screen */
        .calc-display-wrapper {
            background: rgba(5, 5, 8, 0.6);
            border: 1px solid rgba(216, 180, 254, 0.1);
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
            text-align: right;
            position: relative;
            overflow: hidden;
        }

        .calc-formula {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-family: monospace;
            min-height: 18px;
            margin-bottom: 0.25rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .calc-output {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.25rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Keypad Grid */
        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.75rem;
        }

        .calc-btn {
            background: var(--calc-btn-bg);
            border: 1px solid var(--calc-btn-border);
            color: var(--text-primary);
            border-radius: 12px;
            height: 58px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .calc-btn:hover {
            background: rgba(216, 180, 254, 0.06);
            border-color: var(--purple);
            box-shadow: 0 0 10px rgba(216, 180, 254, 0.1);
            color: var(--purple);
        }

        .calc-btn:active {
            transform: scale(0.92);
        }

        /* Operator specific button styling */
        .btn-op {
            color: var(--turquoise);
            border-color: rgba(0, 242, 254, 0.15);
        }

        .btn-op:hover {
            background: rgba(0, 242, 254, 0.06);
            border-color: var(--turquoise);
            box-shadow: var(--neon-shadow-turquoise);
            color: var(--turquoise);
        }

        /* Action/Clear keys */
        .btn-action {
            color: #fca5a5;
            border-color: rgba(239, 68, 68, 0.15);
        }

        .btn-action:hover {
            background: rgba(239, 68, 68, 0.06);
            border-color: #ef4444;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        /* Equal key */
        .btn-equal {
            background: linear-gradient(135deg, var(--turquoise), var(--purple));
            border: none;
            color: #040407;
            font-weight: 700;
            grid-column: span 2;
        }

        .btn-equal:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.35);
            color: #040407;
        }

        .btn-equal:active {
            transform: translateY(1px) scale(0.96);
        }

        /* --- HEART BUTTON (LOVE ENGINE) --- */
        .heart-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            width: 100%;
            max-width: 360px;
        }

        .heart-btn {
            background: linear-gradient(135deg, rgba(254, 1, 154, 0.15) 0%, rgba(254, 1, 154, 0.02) 100%);
            border: 1px solid var(--magenta);
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(254, 1, 154, 0.1);
        }

        .heart-btn svg {
            color: var(--magenta);
            filter: drop-shadow(0 0 5px rgba(254, 1, 154, 0.4));
            transition: transform 0.2s ease;
        }

        .heart-btn:hover {
            transform: scale(1.1);
            background: linear-gradient(135deg, rgba(254, 1, 154, 0.3) 0%, rgba(254, 1, 154, 0.1) 100%);
            box-shadow: var(--neon-shadow-magenta);
        }

        .heart-btn:hover svg {
            transform: scale(1.15);
        }

        .heart-btn:active {
            transform: scale(0.92);
        }

        /* Heart beating animation when clicked */
        .beat-animation {
            animation: heartBeat 0.4s ease-out;
        }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            30% { transform: scale(1.3); }
            60% { transform: scale(0.9); }
            100% { transform: scale(1.1); }
        }

        /* Love Message Box */
        .message-box {
            background: rgba(254, 1, 154, 0.05);
            border: 1px dashed rgba(254, 1, 154, 0.25);
            border-radius: 12px;
            padding: 0.85rem 1.25rem;
            font-size: 0.85rem;
            text-align: center;
            color: #fbcfe8;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            min-height: 40px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .message-box.show {
            opacity: 1;
            transform: translateY(0);
            box-shadow: 0 0 10px rgba(254, 1, 154, 0.05);
        }
    </style>
</head>
<body>

    <div class="ambient-glow-1"></div>
    <div class="ambient-glow-2"></div>

    <header>
        <a href="../index.html" class="logo">KAI // <span>FANCY_CALC</span></a>
        <a href="../index.html" class="back-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Projekt-Hub
        </a>
    </header>

    <main>
        
        <!-- FANCY CALCULATOR -->
        <section class="calc-container">
            <div class="calc-display-wrapper">
                <div class="calc-formula" id="calc-formula"></div>
                <div class="calc-output" id="calc-output">0</div>
            </div>

            <div class="calc-grid">
                <!-- Row 1 -->
                <button class="calc-btn btn-action" onclick="pressClear()">C</button>
                <button class="calc-btn btn-action" onclick="pressBackspace()">⌫</button>
                <button class="calc-btn btn-op" onclick="pressOperator('/')">/</button>
                <button class="calc-btn btn-op" onclick="pressOperator('*')">×</button>
                
                <!-- Row 2 -->
                <button class="calc-btn" onclick="pressDigit(7)">7</button>
                <button class="calc-btn" onclick="pressDigit(8)">8</button>
                <button class="calc-btn" onclick="pressDigit(9)">9</button>
                <button class="calc-btn btn-op" onclick="pressOperator('-')">-</button>
                
                <!-- Row 3 -->
                <button class="calc-btn" onclick="pressDigit(4)">4</button>
                <button class="calc-btn" onclick="pressDigit(5)">5</button>
                <button class="calc-btn" onclick="pressDigit(6)">6</button>
                <button class="calc-btn btn-op" onclick="pressOperator('+')">+</button>
                
                <!-- Row 4 -->
                <button class="calc-btn" onclick="pressDigit(1)">1</button>
                <button class="calc-btn" onclick="pressDigit(2)">2</button>
                <button class="calc-btn" onclick="pressDigit(3)">3</button>
                <button class="calc-btn btn-equal" onclick="pressEqual()">=</button>
                
                <!-- Row 5 -->
                <button class="calc-btn" style="grid-column: span 2;" onclick="pressDigit(0)">0</button>
                <button class="calc-btn" onclick="pressDecimal()">.</button>
            </div>
        </section>

        <!-- HEART BUTTON & MESSAGE DRAWER -->
        <section class="heart-container">
            <button class="heart-btn" id="heart-btn" onclick="triggerLoveMessage()" title="Für dich!">
                <!-- Pulsing Heart Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"></path>
                </svg>
            </button>
            <div class="message-box" id="message-box">
                Klicke auf das Herz für eine kleine Überraschung!
            </div>
        </section>

    </main>

    <!-- SOUND SYNTHESIS -->
    <script>
        class CalcAudio {
            constructor() {
                this.ctx = null;
            }
            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
            }
            playTone(freq, duration = 0.08, type = 'sine', volume = 0.05) {
                try {
                    this.init();
                    if (this.ctx.state === 'suspended') this.ctx.resume();
                    
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                    
                    gain.gain.setValueAtTime(volume, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
                    
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    
                    osc.start();
                    osc.stop(this.ctx.currentTime + duration);
                } catch(e) {}
            }
            playClickDigit() {
                this.playTone(600, 0.05, 'sine', 0.04);
            }
            playClickOp() {
                this.playTone(850, 0.06, 'triangle', 0.05);
            }
            playClickAction() {
                this.playTone(400, 0.1, 'sine', 0.06);
            }
            playEqualTone() {
                try {
                    this.init();
                    const now = this.ctx.currentTime;
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, now); // C5
                    osc.frequency.setValueAtTime(659.25, now + 0.07); // E5
                    osc.frequency.setValueAtTime(783.99, now + 0.14); // G5
                    gain.gain.setValueAtTime(0.05, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start();
                    osc.stop(now + 0.25);
                } catch(e) {}
            }
            playHeartChime() {
                try {
                    this.init();
                    const now = this.ctx.currentTime;
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(880, now); // A5
                    osc.frequency.exponentialRampToValueAtTime(1320, now + 0.3); // E6
                    gain.gain.setValueAtTime(0.06, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start();
                    osc.stop(now + 0.4);
                } catch(e) {}
            }
        }

        const audio = new CalcAudio();

        // --- CALCULATOR LOGIC ---
        let currentInput = "";
        let previousInput = "";
        let activeOperator = null;
        let shouldResetOutput = false;

        const formulaEl = document.getElementById('calc-formula');
        const outputEl = document.getElementById('calc-output');

        function pressDigit(num) {
            audio.playClickDigit();
            if (outputEl.innerText === "0" || shouldResetOutput) {
                currentInput = num.toString();
                shouldResetOutput = false;
            } else {
                currentInput += num.toString();
            }
            updateDisplay();
        }

        function pressDecimal() {
            audio.playClickDigit();
            if (shouldResetOutput) {
                currentInput = "0.";
                shouldResetOutput = false;
                updateDisplay();
                return;
            }
            if (!currentInput.includes('.')) {
                if (currentInput === "") currentInput = "0";
                currentInput += ".";
            }
            updateDisplay();
        }

        function pressOperator(op) {
            audio.playClickOp();
            if (currentInput === "" && previousInput === "") return;
            
            if (previousInput !== "" && currentInput !== "") {
                calculate();
            } else if (currentInput !== "") {
                previousInput = currentInput;
            }
            
            activeOperator = op;
            currentInput = "";
            shouldResetOutput = false;
            updateDisplay();
        }

        function pressClear() {
            audio.playClickAction();
            currentInput = "";
            previousInput = "";
            activeOperator = null;
            shouldResetOutput = false;
            formulaEl.innerText = "";
            outputEl.innerText = "0";
        }

        function pressBackspace() {
            audio.playClickAction();
            if (shouldResetOutput) return;
            currentInput = currentInput.slice(0, -1);
            if (currentInput === "") {
                outputEl.innerText = "0";
            } else {
                updateDisplay();
            }
        }

        function pressEqual() {
            if (previousInput === "" || currentInput === "") return;
            audio.playEqualTone();
            calculate();
            activeOperator = null;
            previousInput = "";
            shouldResetOutput = true;
        }

        function calculate() {
            let result = 0;
            const prev = parseFloat(previousInput);
            const curr = parseFloat(currentInput);

            if (isNaN(prev) || isNaN(curr)) return;

            switch (activeOperator) {
                case '+':
                    result = prev + curr;
                    break;
                case '-':
                    result = prev - curr;
                    break;
                case '*':
                    result = prev * curr;
                    break;
                case '/':
                    if (curr === 0) {
                        outputEl.innerText = "Fehler";
                        formulaEl.innerText = "";
                        currentInput = "";
                        previousInput = "";
                        activeOperator = null;
                        shouldResetOutput = true;
                        return;
                    }
                    result = prev / curr;
                    break;
                default:
                    return;
            }

            // Format result to prevent overflow, maximum 8 decimals
            result = parseFloat(result.toFixed(8));
            formulaEl.innerText = `${previousInput} ${getOperatorSymbol(activeOperator)} ${currentInput} =`;
            outputEl.innerText = result.toString();
            currentInput = result.toString();
        }

        function getOperatorSymbol(op) {
            if (op === '*') return '×';
            return op;
        }

        function updateDisplay() {
            if (currentInput !== "") {
                outputEl.innerText = currentInput;
            }
            
            if (activeOperator) {
                formulaEl.innerText = `${previousInput} ${getOperatorSymbol(activeOperator)}`;
            } else {
                formulaEl.innerText = "";
            }
        }

        // --- LOVE MESSAGES SYSTEM ---
        const messages = [
            "Du bist fantastisch! 💖",
            "Jeder Code, den du schreibst, macht die Welt ein bisschen cooler! ✨",
            "Du machst das einfach super! Glaub an dich.",
            "Kaffee trinken, durchatmen, weitermachen. Du schaffst das! ☕",
            "Fehler im Code sind nur Gelegenheiten, etwas Neues zu lernen. 🧠",
            "Wenn das Leben dir Klammern gibt, mach ein Lächeln daraus! :)",
            "Du hast heute schon tolle Arbeit geleistet! 🏆",
            "Dein Potenzial ist unendlich groß! 🌌",
            "Lass dich nicht unterkriegen – du bist auf dem richtigen Weg!"
        ];

        let lastMessageIndex = -1;

        function triggerLoveMessage() {
            const heartBtn = document.getElementById('heart-btn');
            const msgBox = document.getElementById('message-box');

            // Play Chime
            audio.playHeartChime();

            // Heart beat animation
            heartBtn.classList.remove('beat-animation');
            void heartBtn.offsetWidth; // Trigger reflow
            heartBtn.classList.add('beat-animation');

            // Pick a message (ensure it is different from the last one)
            let index = Math.floor(Math.random() * messages.length);
            while (index === lastMessageIndex && messages.length > 1) {
                index = Math.floor(Math.random() * messages.length);
            }
            lastMessageIndex = index;

            // Fade animation for text
            msgBox.classList.remove('show');
            setTimeout(() => {
                msgBox.innerText = messages[index];
                msgBox.classList.add('show');
            }, 200);
        }

        // Support for keyboard inputs in calculator
        window.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') {
                pressDigit(parseInt(e.key));
            } else if (e.key === '.') {
                pressDecimal();
            } else if (e.key === '+' || e.key === '-' || e.key === '/' || e.key === '*') {
                pressOperator(e.key);
            } else if (e.key === 'Enter' || e.key === '=') {
                pressEqual();
            } else if (e.key === 'Backspace') {
                pressBackspace();
            } else if (e.key === 'Escape' || e.key === 'c' || e.key === 'C') {
                pressClear();
            }
        });
    </script>
</body>
</html>

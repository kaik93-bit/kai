<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON_MINER // Cyberpunk Idle Clicker</title>
    
    <!-- Google Fonts: Space Grotesk (Sci-Fi headings) & Inter (Clean UI text) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #080b11;
            --panel-bg: rgba(13, 19, 33, 0.75);
            --border-glow: rgba(0, 242, 254, 0.15);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            
            /* Neon color scheme */
            --cyan: #00f2fe;
            --magenta: #fe019a;
            --yellow: #f8e71c;
            --success: #10b981;
            
            --neon-shadow-cyan: 0 0 15px rgba(0, 242, 254, 0.35);
            --neon-shadow-magenta: 0 0 15px rgba(254, 1, 154, 0.35);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        /* Scanline Overlay for Cyberpunk CRT effect */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 9999;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        /* Glow effects in the background */
        .ambient-glow-1 {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.08) 0%, transparent 70%);
            top: -100px;
            left: -100px;
            pointer-events: none;
            z-index: -1;
        }

        .ambient-glow-2 {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(254, 1, 154, 0.06) 0%, transparent 70%);
            bottom: -150px;
            right: -100px;
            pointer-events: none;
            z-index: -1;
        }

        header {
            background: rgba(8, 11, 17, 0.9);
            border-bottom: 1px solid rgba(0, 242, 254, 0.2);
            padding: 1.25rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            z-index: 10;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .brand {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
        }

        .brand span {
            color: var(--magenta);
            text-shadow: 0 0 10px rgba(254, 1, 154, 0.5);
        }

        .version {
            font-family: monospace;
            font-size: 0.75rem;
            color: var(--cyan);
            border: 1px solid rgba(0, 242, 254, 0.4);
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
        }

        .stats-summary {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .stat-item {
            text-align: right;
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
        }

        .stat-value {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.25rem;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            padding: 0.6rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            background: rgba(0, 242, 254, 0.1);
            border-color: var(--cyan);
            color: var(--cyan);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
        }

        /* Main Game Layout */
        .game-container {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            padding: 2rem;
            gap: 2rem;
            flex-grow: 1;
        }

        @media (max-width: 1024px) {
            .game-container {
                grid-template-columns: 1fr;
            }
        }

        /* Left Side: Mining Terminal & Core */
        .terminal-panel {
            background: var(--panel-bg);
            border: 1px solid rgba(0, 242, 254, 0.1);
            border-radius: 16px;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0, 242, 254, 0.03);
            backdrop-filter: blur(15px);
        }

        /* Decorative Terminal Border Corners */
        .terminal-panel::after, .shop-panel::after {
            content: '';
            position: absolute;
            top: -1px; left: -1px; width: 20px; height: 20px;
            border-top: 2px solid var(--cyan);
            border-left: 2px solid var(--cyan);
            border-radius: 16px 0 0 0;
            pointer-events: none;
        }

        .terminal-panel::before, .shop-panel::before {
            content: '';
            position: absolute;
            bottom: -1px; right: -1px; width: 20px; height: 20px;
            border-bottom: 2px solid var(--magenta);
            border-right: 2px solid var(--magenta);
            border-radius: 0 0 16px 0;
            pointer-events: none;
        }

        .display-container {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .credits-total {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 3.5rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .credits-label {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--cyan);
            text-shadow: 0 0 8px rgba(0, 242, 254, 0.3);
        }

        /* Interactive Glowing Node Core */
        .mining-core-wrapper {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 2.5rem 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .mining-core {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(13, 27, 42, 1) 0%, rgba(8, 14, 24, 1) 100%);
            border: 4px solid var(--cyan);
            box-shadow: var(--neon-shadow-cyan), inset 0 0 25px rgba(0, 242, 254, 0.3);
            cursor: pointer;
            position: relative;
            transition: all 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }

        .mining-core:hover {
            transform: scale(1.03);
            border-color: #fff;
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.6), inset 0 0 35px rgba(0, 242, 254, 0.5);
        }

        .mining-core:active {
            transform: scale(0.95);
            border-color: var(--magenta);
            box-shadow: 0 0 30px rgba(254, 1, 154, 0.8), inset 0 0 40px rgba(254, 1, 154, 0.6);
        }

        .core-inner-glow {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--cyan), var(--magenta));
            opacity: 0.7;
            filter: blur(10px);
            animation: pulse 4s infinite alternate;
        }

        /* Core Ring Rotation Animations */
        .core-orbit-ring {
            position: absolute;
            border: 2px dashed rgba(0, 242, 254, 0.3);
            border-radius: 50%;
            pointer-events: none;
        }

        .ring-1 {
            width: 250px;
            height: 250px;
            animation: rotate-cw 20s linear infinite;
        }

        .ring-2 {
            width: 275px;
            height: 275px;
            border: 1px dashed rgba(254, 1, 154, 0.3);
            animation: rotate-ccw 15s linear infinite;
        }

        /* Floating text effects on click */
        .floating-text {
            position: absolute;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--cyan);
            pointer-events: none;
            z-index: 5;
            animation: floatUp 0.8s ease-out forwards;
            text-shadow: 0 0 8px rgba(0, 242, 254, 0.6);
        }

        .floating-text.multiplier {
            color: var(--yellow);
            text-shadow: 0 0 8px rgba(248, 231, 28, 0.6);
        }

        /* Buffs & Power-ups */
        .overclock-container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .overclock-btn {
            width: 100%;
            background: linear-gradient(135deg, rgba(254, 1, 154, 0.2) 0%, rgba(254, 1, 154, 0.05) 100%);
            border: 1px solid var(--magenta);
            color: #fff;
            padding: 1rem;
            border-radius: 10px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(254, 1, 154, 0.1);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .overclock-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, rgba(254, 1, 154, 0.4) 0%, rgba(254, 1, 154, 0.1) 100%);
            box-shadow: var(--neon-shadow-magenta);
            transform: translateY(-2px);
        }

        .overclock-btn:disabled {
            border-color: rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            cursor: not-allowed;
            background: rgba(255, 255, 255, 0.02);
        }

        .overclock-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            background: var(--magenta);
            width: 0%;
            box-shadow: 0 0 10px var(--magenta);
            transition: width 0.1s linear;
        }

        .overclock-cooldown-text {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
            font-family: monospace;
        }

        /* Right Side: Upgrade Shop */
        .shop-panel {
            background: var(--panel-bg);
            border: 1px solid rgba(0, 242, 254, 0.1);
            border-radius: 16px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            max-height: 700px;
            backdrop-filter: blur(15px);
        }

        .shop-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 1rem;
        }

        .shop-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .shop-tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            padding: 0.25rem;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .shop-tab {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s ease;
            font-family: 'Space Grotesk', sans-serif;
        }

        .shop-tab.active {
            background: var(--cyan);
            color: #080b11;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
        }

        .upgrades-list {
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 0.5rem;
        }

        /* Custom Scrollbar for Shop */
        .upgrades-list::-webkit-scrollbar {
            width: 6px;
        }
        .upgrades-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 3px;
        }
        .upgrades-list::-webkit-scrollbar-thumb {
            background: rgba(0, 242, 254, 0.2);
            border-radius: 3px;
        }
        .upgrades-list::-webkit-scrollbar-thumb:hover {
            background: var(--cyan);
        }

        .upgrade-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .upgrade-card:hover:not(.disabled) {
            background: rgba(0, 242, 254, 0.04);
            border-color: rgba(0, 242, 254, 0.4);
            transform: translateX(3px);
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.05);
        }

        .upgrade-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .upgrade-card.disabled .upgrade-cost {
            color: var(--magenta);
        }

        .upgrade-details {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-grow: 1;
        }

        .upgrade-icon-wrapper {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            background: rgba(0, 242, 254, 0.08);
            border: 1px solid rgba(0, 242, 254, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            color: var(--cyan);
        }

        .upgrade-card:hover:not(.disabled) .upgrade-icon-wrapper {
            color: #fff;
            background: var(--cyan);
            border-color: var(--cyan);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
        }

        .upgrade-text {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .upgrade-name {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 1rem;
        }

        .upgrade-desc {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .upgrade-meta {
            text-align: right;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            min-width: 90px;
        }

        .upgrade-cost {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            color: var(--cyan);
            font-size: 1.05rem;
        }

        .upgrade-count {
            font-family: monospace;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* Achievements Banner */
        .achievement-toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: rgba(13, 19, 33, 0.95);
            border: 1px solid var(--yellow);
            border-radius: 8px;
            padding: 1rem 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px rgba(248, 231, 28, 0.15);
            display: flex;
            align-items: center;
            gap: 1rem;
            z-index: 1000;
            transform: translateY(150%);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 320px;
        }

        .achievement-toast.show {
            transform: translateY(0);
        }

        .achievement-icon {
            font-size: 1.75rem;
            color: var(--yellow);
            text-shadow: 0 0 10px rgba(248, 231, 28, 0.4);
        }

        .achievement-title {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            color: #fff;
        }

        .achievement-desc {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        /* Bottom Auto-Save Status */
        .status-bar {
            background: rgba(8, 11, 17, 0.85);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 0.75rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-family: monospace;
        }

        .save-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .save-dot {
            width: 6px;
            height: 6px;
            background: var(--success);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px var(--success);
        }

        /* Keyframes */
        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.5; }
            100% { transform: scale(1.1); opacity: 0.85; }
        }

        @keyframes rotate-cw {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes rotate-ccw {
            from { transform: rotate(0deg); }
            to { transform: rotate(-360deg); }
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) translateY(-100px) scale(0.8);
            }
        }

        /* Highlight animation for core clicked */
        .core-click-pulse {
            animation: corePulse 0.15s ease-out;
        }

        @keyframes corePulse {
            0% { box-shadow: 0 0 15px rgba(0, 242, 254, 0.4), inset 0 0 10px rgba(0, 242, 254, 0.2); }
            50% { box-shadow: 0 0 40px rgba(0, 242, 254, 0.8), inset 0 0 25px rgba(0, 242, 254, 0.5); }
            100% { box-shadow: var(--neon-shadow-cyan), inset 0 0 25px rgba(0, 242, 254, 0.3); }
        }
    </style>
</head>
<body>

    <div class="ambient-glow-1"></div>
    <div class="ambient-glow-2"></div>

    <header>
        <div class="brand-container">
            <div class="brand">NEON<span>_MINER</span></div>
            <div class="version">V1.2.0</div>
        </div>
        
        <div class="stats-summary">
            <div class="stat-item">
                <div class="stat-label">Hacking Rate</div>
                <div class="stat-value" id="stats-dps" style="color: var(--cyan);">0.0 DPS</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Click Power</div>
                <div class="stat-value" id="stats-click" style="color: var(--magenta);">+1</div>
            </div>
        </div>

        <div class="header-controls">
            <button class="icon-btn" id="mute-btn" title="Ton stummschalten" onclick="toggleMute()">
                <!-- Speaker Icon -->
                <svg id="volume-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                </svg>
            </button>
            <button class="icon-btn" title="Fortschritt zurücksetzen" onclick="confirmReset()">
                <!-- Reset Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path>
                </svg>
            </button>
        </div>
    </header>

    <main class="game-container">
        
        <!-- Left Column: Terminal & Core -->
        <section class="terminal-panel">
            <div class="display-container">
                <div class="credits-total">
                    <span style="color: var(--cyan)">$</span>
                    <span id="credit-count">0</span>
                </div>
                <div class="credits-label">Gecryptete Credits</div>
            </div>

            <!-- Core Click Target -->
            <div class="mining-core-wrapper">
                <div class="core-orbit-ring ring-1"></div>
                <div class="core-orbit-ring ring-2"></div>
                <div class="mining-core" id="core-btn" onclick="mine(event)">
                    <div class="core-inner-glow"></div>
                </div>
            </div>

            <!-- Overclock Skill (Cooldown Ability) -->
            <div class="overclock-container">
                <button class="overclock-btn" id="overclock-btn" onclick="triggerOverclock()">
                    <span>OVERCLOCK.EXE AKTIVIEREN</span>
                    <span id="overclock-timer"></span>
                    <div class="overclock-progress" id="overclock-progress"></div>
                </button>
                <div class="overclock-cooldown-text" id="overclock-cooldown-text">
                    Bereit zur Ausführung (5x Klick-Multiplikator für 10s)
                </div>
            </div>
        </section>

        <!-- Right Column: Upgrades Shop -->
        <section class="shop-panel">
            <div class="shop-header">
                <div class="shop-title">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--cyan)">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                        <line x1="8" y1="21" x2="16" y2="21"></line>
                        <line x1="12" y1="17" x2="12" y2="21"></line>
                    </svg>
                    Upgrade Terminal
                </div>
                
                <div class="shop-tabs">
                    <button class="shop-tab active" id="tab-hardware" onclick="switchTab('hardware')">Hardware</button>
                    <button class="shop-tab" id="tab-software" onclick="switchTab('software')">Software</button>
                </div>
            </div>

            <!-- Scrollable Upgrade Cards List -->
            <div class="upgrades-list" id="upgrades-container">
                <!-- Dynamically generated through JavaScript -->
            </div>
        </section>

    </main>

    <!-- Achievement Notification -->
    <div class="achievement-toast" id="achievement-toast">
        <div class="achievement-icon">🏆</div>
        <div>
            <div class="achievement-title" id="ach-title">Achievement Unlocked</div>
            <div class="achievement-desc" id="ach-desc">Description of achievement.</div>
        </div>
    </div>

    <!-- Bottom Status Bar -->
    <footer class="status-bar">
        <div class="save-indicator">
            <span class="save-dot"></span>
            <span id="save-status">Systeme normal // Daten synchronisiert</span>
        </div>
        <div>
            Gespielt von: <a href="https://github.com/kaik93-bit" target="_blank" style="color: var(--cyan); text-decoration: none;">kaik93-bit</a>
        </div>
    </footer>

    <script>
        // --- Web Audio Synthesis (Premium retro SFX) ---
        class WebAudioController {
            constructor() {
                this.ctx = null;
                this.muted = false;
            }

            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            }

            playClick() {
                if (this.muted) return;
                this.init();
                
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, this.ctx.currentTime + 0.08);
                
                gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.08);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                
                osc.start();
                osc.stop(this.ctx.currentTime + 0.08);
            }

            playBuy() {
                if (this.muted) return;
                this.init();
                
                const now = this.ctx.currentTime;
                const playTone = (freq, time, duration) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, time);
                    
                    gain.gain.setValueAtTime(0.1, time);
                    gain.gain.exponentialRampToValueAtTime(0.01, time + duration);
                    
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    
                    osc.start(time);
                    osc.stop(time + duration);
                };
                
                playTone(523.25, now, 0.08); // C5
                playTone(659.25, now + 0.08, 0.08); // E5
                playTone(783.99, now + 0.16, 0.15); // G5
            }

            playAchievement() {
                if (this.muted) return;
                this.init();
                
                const now = this.ctx.currentTime;
                const playTone = (freq, time, duration) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(freq, time);
                    
                    gain.gain.setValueAtTime(0.05, time);
                    gain.gain.exponentialRampToValueAtTime(0.01, time + duration);
                    
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    
                    osc.start(time);
                    osc.stop(time + duration);
                };
                
                playTone(587.33, now, 0.1);
                playTone(698.46, now + 0.1, 0.1);
                playTone(880.00, now + 0.2, 0.1);
                playTone(1046.50, now + 0.3, 0.3);
            }

            playOverclock() {
                if (this.muted) return;
                this.init();
                
                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.5);
                
                gain.gain.setValueAtTime(0.12, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                
                osc.start();
                osc.stop(now + 0.5);
            }
        }

        const audio = new WebAudioController();

        function toggleMute() {
            audio.muted = !audio.muted;
            const icon = document.getElementById('volume-icon');
            if (audio.muted) {
                icon.innerHTML = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line>`;
            } else {
                icon.innerHTML = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>`;
            }
        }

        // --- Game Logic ---
        let state = {
            credits: 0,
            totalCreditsMined: 0,
            clickPower: 1,
            dps: 0,
            currentTab: 'hardware',
            overclockActive: false,
            overclockCooldown: false,
            upgrades: {
                // Tab: Hardware (Click Power upgrades)
                'uplink': { id: 'uplink', tab: 'hardware', name: 'Neural Uplink', cost: 15, count: 0, power: 1, desc: 'Erhöht Klick-Power um +1', costMultiplier: 1.15, icon: '⚡' },
                'cpu': { id: 'cpu', tab: 'hardware', name: 'Quanten-Cores', cost: 120, count: 0, power: 8, desc: 'Erhöht Klick-Power um +8', costMultiplier: 1.18, icon: '💾' },
                'hacker_deck': { id: 'hacker_deck', tab: 'hardware', name: 'Cyber-Deck v2', cost: 850, count: 0, power: 45, desc: 'Erhöht Klick-Power um +45', costMultiplier: 1.2, icon: '💻' },
                'subdermal': { id: 'subdermal', tab: 'hardware', name: 'Subdermal Rigs', cost: 5000, count: 0, power: 250, desc: 'Erhöht Klick-Power um +250', costMultiplier: 1.25, icon: '🧠' },

                // Tab: Software (Auto Miner / DPS upgrades)
                'crawler': { id: 'crawler', tab: 'software', name: 'Node Crawler', cost: 50, count: 0, dps: 1, desc: 'Sammelt automatisch +1 Credit/s', costMultiplier: 1.15, icon: '🕷️' },
                'botnet': { id: 'botnet', tab: 'software', name: 'Shadow Botnet', cost: 350, count: 0, dps: 6, desc: 'Erzeugt automatisch +6 Credits/s', costMultiplier: 1.17, icon: '🤖' },
                'daemon': { id: 'daemon', tab: 'software', name: 'Mining Daemon', cost: 2000, count: 0, dps: 35, desc: 'Generiert im Hintergrund +35 Credits/s', costMultiplier: 1.2, icon: '👿' },
                'ai_agent': { id: 'ai_agent', tab: 'software', name: 'AI Subroutine', cost: 12500, count: 0, dps: 180, desc: 'Ein autonomer Mining-Agent (+180/s)', costMultiplier: 1.22, icon: '🧬' },
                'mainframe': { id: 'mainframe', tab: 'software', name: 'Mainframe Hack', cost: 75000, count: 0, dps: 950, desc: 'Komplette Systemübernahme (+950/s)', costMultiplier: 1.25, icon: '📡' }
            },
            achievements: {
                'first_click': { name: 'Cyber-Initiation', desc: 'Den Daten-Core zum ersten Mal gehackt', unlocked: false, cond: () => state.totalCreditsMined >= 1 },
                'hundred': { name: 'Daten-Sammler', desc: '100 Credits insgesamt generiert', unlocked: false, cond: () => state.totalCreditsMined >= 100 },
                'thousands': { name: 'Elite-Skripter', desc: '5.000 Credits insgesamt generiert', unlocked: false, cond: () => state.totalCreditsMined >= 5000 },
                'first_upgrade': { name: 'System Upgrade', desc: 'Dein erstes Upgrade gekauft', unlocked: false, cond: () => Object.values(state.upgrades).some(u => u.count > 0) },
                'dps_master': { name: 'Automatisierung', desc: 'Mehr als 100 Credits pro Sekunde erreicht', unlocked: false, cond: () => state.dps >= 100 }
            }
        };

        // --- Core Mine Actions ---
        function mine(event) {
            // Audio play
            audio.playClick();

            // Calculate yield
            let currentYield = state.clickPower;
            if (state.overclockActive) {
                currentYield *= 5;
            }

            state.credits += currentYield;
            state.totalCreditsMined += currentYield;

            // Trigger visual scaling pulse
            const coreBtn = document.getElementById('core-btn');
            coreBtn.classList.remove('core-click-pulse');
            void coreBtn.offsetWidth; // Trigger reflow to restart animation
            coreBtn.classList.add('core-click-pulse');

            // Floating text representation
            createFloatingText(event, currentYield);

            updateUI();
            checkAchievements();
        }

        function createFloatingText(event, amount) {
            const rect = document.getElementById('core-btn').getBoundingClientRect();
            
            // Determine relative mouse position or center if keyboard trigger
            let x = rect.left + rect.width / 2;
            let y = rect.top + rect.height / 2;
            
            if (event && event.clientX) {
                x = event.clientX;
                y = event.clientY;
            }

            const floatDiv = document.createElement('div');
            floatDiv.className = 'floating-text';
            if (state.overclockActive) {
                floatDiv.className += ' multiplier';
                floatDiv.innerText = `+${formatNumber(amount)} (x5)`;
            } else {
                floatDiv.innerText = `+${formatNumber(amount)}`;
            }
            
            floatDiv.style.left = `${x}px`;
            floatDiv.style.top = `${y}px`;

            document.body.appendChild(floatDiv);

            // Cleanup DOM after animation completes
            setTimeout(() => {
                floatDiv.remove();
            }, 800);
        }

        // --- Overclock / Skill Activation ---
        let overclockTimerId = null;
        let cooldownTimerId = null;

        function triggerOverclock() {
            if (state.overclockActive || state.overclockCooldown) return;

            audio.playOverclock();
            state.overclockActive = true;
            
            const btn = document.getElementById('overclock-btn');
            const progress = document.getElementById('overclock-progress');
            const cdText = document.getElementById('overclock-cooldown-text');
            
            btn.disabled = true;
            btn.style.border = '1px solid var(--yellow)';
            btn.querySelector('span').innerText = 'OVERCLOCK AKTIV // 5X MULTIPLIKATOR';
            btn.querySelector('span').style.color = 'var(--yellow)';
            
            let duration = 10; // 10 seconds duration
            progress.style.width = '100%';
            progress.style.background = 'var(--yellow)';
            progress.style.boxShadow = '0 0 10px var(--yellow)';
            
            // Linear reduction animation of progress bar
            let elapsed = 0;
            const interval = 100;
            overclockTimerId = setInterval(() => {
                elapsed += interval;
                let percent = 100 - (elapsed / (duration * 1000)) * 100;
                progress.style.width = `${percent}%`;
                
                if (elapsed >= duration * 1000) {
                    clearInterval(overclockTimerId);
                    deactivateOverclock();
                }
            }, interval);
        }

        function deactivateOverclock() {
            state.overclockActive = false;
            state.overclockCooldown = true;

            const btn = document.getElementById('overclock-btn');
            const progress = document.getElementById('overclock-progress');
            const cdText = document.getElementById('overclock-cooldown-text');
            
            btn.querySelector('span').innerText = 'OVERCLOCK KÜHLT AB...';
            btn.querySelector('span').style.color = 'var(--text-secondary)';
            btn.style.border = '1px solid rgba(255, 255, 255, 0.05)';
            progress.style.background = 'var(--magenta)';
            progress.style.boxShadow = '0 0 10px var(--magenta)';

            let cooldown = 30; // 30 seconds cooldown
            let elapsed = 0;
            const interval = 100;

            cooldownTimerId = setInterval(() => {
                elapsed += interval;
                let percent = (elapsed / (cooldown * 1000)) * 100;
                progress.style.width = `${percent}%`;
                
                let remaining = Math.ceil(cooldown - (elapsed / 1000));
                cdText.innerText = `Reboot läuft... Noch ${remaining}s`;

                if (elapsed >= cooldown * 1000) {
                    clearInterval(cooldownTimerId);
                    state.overclockCooldown = false;
                    
                    btn.disabled = false;
                    btn.style.border = '1px solid var(--magenta)';
                    btn.querySelector('span').innerText = 'OVERCLOCK.EXE AKTIVIEREN';
                    btn.querySelector('span').style.color = '#fff';
                    progress.style.width = '0%';
                    cdText.innerText = 'Bereit zur Ausführung (5x Klick-Multiplikator für 10s)';
                }
            }, interval);
        }

        // --- Shop & Tabs logic ---
        function switchTab(tabName) {
            state.currentTab = tabName;
            document.getElementById('tab-hardware').classList.toggle('active', tabName === 'hardware');
            document.getElementById('tab-software').classList.toggle('active', tabName === 'software');
            renderShop();
        }

        function renderShop() {
            const container = document.getElementById('upgrades-container');
            container.innerHTML = '';

            const filtered = Object.values(state.upgrades).filter(u => u.tab === state.currentTab);
            
            filtered.forEach(upgrade => {
                const isAffordable = state.credits >= upgrade.cost;
                const card = document.createElement('div');
                card.className = `upgrade-card ${isAffordable ? '' : 'disabled'}`;
                card.onclick = () => buyUpgrade(upgrade.id);

                card.innerHTML = `
                    <div class="upgrade-details">
                        <div class="upgrade-icon-wrapper">
                            <span style="font-size: 1.5rem;">${upgrade.icon}</span>
                        </div>
                        <div class="upgrade-text">
                            <span class="upgrade-name">${upgrade.name}</span>
                            <span class="upgrade-desc">${upgrade.desc}</span>
                        </div>
                    </div>
                    <div class="upgrade-meta">
                        <span class="upgrade-cost">$${formatNumber(Math.floor(upgrade.cost))}</span>
                        <span class="upgrade-count">Besitz: ${upgrade.count}</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function buyUpgrade(id) {
            const upgrade = state.upgrades[id];
            if (state.credits < upgrade.cost) return;

            audio.playBuy();
            state.credits -= upgrade.cost;
            upgrade.count += 1;
            
            // Recalculate price
            upgrade.cost = Math.floor(upgrade.cost * upgrade.costMultiplier);

            recalculateIncome();
            renderShop();
            updateUI();
            checkAchievements();
            saveGame();
        }

        function recalculateIncome() {
            // Click power
            let baseClick = 1;
            Object.values(state.upgrades).forEach(up => {
                if (up.tab === 'hardware') {
                    baseClick += up.count * up.power;
                }
            });
            state.clickPower = baseClick;

            // Idle income (DPS)
            let baseDps = 0;
            Object.values(state.upgrades).forEach(up => {
                if (up.tab === 'software') {
                    baseDps += up.count * up.dps;
                }
            });
            state.dps = baseDps;
        }

        // --- Core UI updates ---
        function updateUI() {
            document.getElementById('credit-count').innerText = formatNumber(Math.floor(state.credits));
            document.getElementById('stats-dps').innerText = `${state.dps.toFixed(1)} DPS`;
            document.getElementById('stats-click').innerText = `+${state.clickPower}`;

            // Refresh only disabled classes without full redraw to avoid lag during shop views
            const cards = document.querySelectorAll('.upgrade-card');
            const filteredUpgrades = Object.values(state.upgrades).filter(u => u.tab === state.currentTab);
            
            cards.forEach((card, index) => {
                const upgrade = filteredUpgrades[index];
                if (upgrade) {
                    const isAffordable = state.credits >= upgrade.cost;
                    card.classList.toggle('disabled', !isAffordable);
                }
            });
        }

        // --- Achievements Engine ---
        function checkAchievements() {
            Object.keys(state.achievements).forEach(key => {
                const ach = state.achievements[key];
                if (!ach.unlocked && ach.cond()) {
                    ach.unlocked = true;
                    showAchievementToast(ach);
                }
            });
        }

        function showAchievementToast(ach) {
            audio.playAchievement();
            
            const toast = document.getElementById('achievement-toast');
            document.getElementById('ach-title').innerText = ach.name;
            document.getElementById('ach-desc').innerText = ach.desc;

            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 4000);
        }

        // --- Utilities ---
        function formatNumber(num) {
            if (num >= 1e9) {
                return (num / 1e9).toFixed(2) + 'B';
            }
            if (num >= 1e6) {
                return (num / 1e6).toFixed(2) + 'M';
            }
            if (num >= 1e3) {
                return (num / 1e3).toFixed(1) + 'K';
            }
            return num.toString();
        }

        // --- Idle Processing (10 ticks per second) ---
        let lastTick = Date.now();
        setInterval(() => {
            const now = Date.now();
            const delta = (now - lastTick) / 1000;
            lastTick = now;

            if (state.dps > 0) {
                const creditGained = state.dps * delta;
                state.credits += creditGained;
                state.totalCreditsMined += creditGained;
                updateUI();
                checkAchievements();
            }
        }, 100);

        // --- Save and Load Game ---
        function saveGame() {
            localStorage.setItem('neon_miner_save', JSON.stringify({
                credits: state.credits,
                totalCreditsMined: state.totalCreditsMined,
                upgrades: Object.fromEntries(
                    Object.entries(state.upgrades).map(([key, val]) => [key, { count: val.count, cost: val.cost }])
                ),
                achievements: Object.fromEntries(
                    Object.entries(state.achievements).map(([key, val]) => [key, { unlocked: val.unlocked }])
                )
            }));
            flashSaveIndicator();
        }

        function loadGame() {
            const raw = localStorage.getItem('neon_miner_save');
            if (!raw) {
                recalculateIncome();
                renderShop();
                updateUI();
                return;
            }

            try {
                const data = JSON.parse(raw);
                state.credits = data.credits || 0;
                state.totalCreditsMined = data.totalCreditsMined || 0;

                if (data.upgrades) {
                    Object.keys(data.upgrades).forEach(key => {
                        if (state.upgrades[key]) {
                            state.upgrades[key].count = data.upgrades[key].count || 0;
                            state.upgrades[key].cost = data.upgrades[key].cost || state.upgrades[key].cost;
                        }
                    });
                }

                if (data.achievements) {
                    Object.keys(data.achievements).forEach(key => {
                        if (state.achievements[key]) {
                            state.achievements[key].unlocked = data.achievements[key].unlocked || false;
                        }
                    });
                }

                recalculateIncome();
                renderShop();
                updateUI();
            } catch (err) {
                console.error("Fehler beim Laden des Spielstands: ", err);
            }
        }

        function confirmReset() {
            if (confirm("Möchtest du deinen gesamten Fortschritt wirklich zurücksetzen? Dies kann nicht rückgängig gemacht werden!")) {
                localStorage.removeItem('neon_miner_save');
                // Clean timers
                if (overclockTimerId) clearInterval(overclockTimerId);
                if (cooldownTimerId) clearInterval(cooldownTimerId);
                
                // Reload window to reset state simply
                window.location.reload();
            }
        }

        function flashSaveIndicator() {
            const statusText = document.getElementById('save-status');
            statusText.innerText = "Fortschritt automatisch gespeichert // Cloud Sync OK";
            
            setTimeout(() => {
                statusText.innerText = "Systeme normal // Daten synchronisiert";
            }, 3000);
        }

        // Auto Save interval (every 10s)
        setInterval(saveGame, 10000);

        // Before unloading page
        window.addEventListener('beforeunload', saveGame);

        // Initialize game on load
        window.onload = () => {
            loadGame();
        };
    </script>
</body>
</html>
